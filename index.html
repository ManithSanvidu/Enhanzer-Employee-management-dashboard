<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee - eZuite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button class="icon-btn" type="button" aria-label="Home">
                <i class="fas fa-house"></i>
            </button>
            <div class="brand">
                <span class="brand-mark">|||</span>
                <span class="brand-name">eZuite</span>
            </div>
        </div>
        <div class="header-center">
            <nav class="breadcrumb">
                <span>eCore</span>
                <i class="fas fa-chevron-right"></i>
                <span class="breadcrumb-current">Employee <i class="fas fa-chevron-down"></i></span>
            </nav>
            <button class="icon-btn" type="button" aria-label="Favorite">
                <i class="far fa-star"></i>
            </button>
            <button class="icon-btn" type="button" aria-label="Add record">
                <i class="fas fa-clipboard-list"></i>
                <i class="fas fa-plus add-plus"></i>
            </button>
        </div>
        <div class="header-right">
            <span class="user-name">Enhancer</span>
            <div class="avatar avatar-header">A</div>
            <button class="icon-btn" type="button" aria-label="Notifications">
                <i class="far fa-bell"></i>
            </button>
            <button class="icon-btn" type="button" aria-label="Favorites">
                <i class="far fa-star"></i>
            </button>
            <button class="icon-btn" type="button" aria-label="Settings">
                <i class="fas fa-gear"></i>
            </button>
        </div>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-item">
                    <i class="fas fa-grip"></i>
                    <span>Admin</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-handshake"></i>
                    <span>CRM</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-file-lines"></i>
                    <span>Procurement</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-boxes-stacked"></i>
                    <span>Inventory</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-industry"></i>
                    <span>Manufacturing</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-cart-shopping"></i>
                    <span>Sales</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-dollar-sign"></i>
                    <span>Finance</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-chart-column"></i>
                    <span>Assets</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-wrench"></i>
                    <span>Services</span>
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fas fa-truck"></i>
                    <span>Logistics</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span class="version">v2.1</span>
                <button class="icon-btn" type="button" aria-label="Refresh">
                    <i class="fas fa-rotate-right"></i>
                </button>
            </div>
        </aside>

        <div class="main-wrapper">
            <main class="content">
                <div class="toolbar">
                    <div class="tabs" id="tabs">
                        <button class="tab" data-tab="draft" type="button">
                            <i class="far fa-file"></i>
                            <span>Drafts</span>
                        </button>
                        <button class="tab active" data-tab="active" type="button">
                            <i class="far fa-file"></i>
                            <span>Active</span>
                            <span class="tab-badge" id="activeBadge">16</span>
                        </button>
                        <button class="tab" data-tab="inactive" type="button">
                            <i class="far fa-file"></i>
                            <span>Inactive</span>
                        </button>
                        <button class="tab" data-tab="deleted" type="button">
                            <i class="far fa-square-check"></i>
                            <span>Deleted</span>
                        </button>
                    </div>
                    <div class="toolbar-right">
                        <div class="search-box">
                            <i class="fas fa-magnifying-glass"></i>
                            <input type="search" id="searchInput" placeholder="Search" aria-label="Search employees">
                        </div>
                        <div class="pagination" id="pagination">
                            <button type="button" class="page-btn" data-page="prev" aria-label="Previous page">&lt;</button>
                            <button type="button" class="page-btn active" data-page="1">1</button>
                            <button type="button" class="page-btn" data-page="2">2</button>
                            <button type="button" class="page-btn" data-page="3">3</button>
                            <button type="button" class="page-btn" data-page="next" aria-label="Next page">&gt;</button>
                            <span class="page-ellipsis">...</span>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Address</th>
                                <th>Mobile</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Updated</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTable"></tbody>
                    </table>
                </div>
            </main>
            <footer class="page-footer">
                <span>&copy; 2024 eZuite. All rights reserved.</span>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
